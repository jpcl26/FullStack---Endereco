<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Endereço por CEP</title>
    <script>
        async function buscarEndereco() {
            const cep = document.getElementById('cep').value;
            const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await response.json();
            if (data.erro) {
                document.getElementById('resultado').innerText = 'CEP não encontrado!';
            } else {
                document.getElementById('resultado').innerHTML = `Endereco: ${data.logradouro}, ${data.bairro}, ${data.localidade} - ${data.uf}`;
            }
        }
    </script>
</head>
<body>
    <h1>Buscar Endereço por CEP</h1>
    <form onsubmit="event.preventDefault(); buscarEndereco();">
        <label for="cep">CEP:</label>
        <input type="text" id="cep" name="cep" required>
        <button type="submit">Buscar</button>
    </form>
    <div id="resultado"></div>
</body>
</html>
